services:
  # Spring Boot Native Application (GraalVM)
  spring-app-native:
    build:
      context: .
      dockerfile: Dockerfile-native
    container_name: spring-boot-app-native
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    networks:
      - spring-network
    restart: unless-stopped

networks:
  spring-network:
    driver: bridge
