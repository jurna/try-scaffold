services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: postgres-db-native
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data-native:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    networks:
      - spring-network

  # Spring Boot Native Application (GraalVM)
  spring-app-native:
    build:
      context: .
      dockerfile: Dockerfile-native
    container_name: spring-boot-app-native
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mydb
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    networks:
      - spring-network
    restart: unless-stopped

volumes:
  postgres-data-native:
    driver: local

networks:
  spring-network:
    driver: bridge
